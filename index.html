<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalibrary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [v-cloak] { display: none; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .prose { max-width: 65ch; margin: auto; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20">

    <div id="app">
        <div id="loading-screen" class="min-h-screen flex items-center justify-center font-medium text-slate-500">
            Chargement de Digitalibrary...
        </div>

        <div id="main-content" class="hidden">
            <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                    <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-cyan-500 bg-clip-text text-transparent">
                        Digitalibrary
                    </span>
                </div>
                
                <div class="flex items-center gap-3" id="header-actions"></div>
            </header>

            <main class="max-w-4xl mx-auto px-4 py-6" id="view-container"></main>

            <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center p-3 md:hidden z-50">
                <button onclick="navigateTo('home')" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="shopping-bag"></i></button>
                <button onclick="navigateTo('library')" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="library"></i></button>
                <button onclick="navigateTo('login')" class="p-2 text-slate-400 hover:text-blue-600"><i data-lucide="user"></i></button>
            </nav>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBX9djisjpK0Owoj216ehlj0O0E",
        authDomain: "livres-de-sabotage.firebaseapp.com",
        projectId: "livres-de-chehhhhh",
        storageBucket: "livres-de-nononoononoonon.firebasestorage.app",
        messagingSenderId: "1053280376382873891164981226383926892948",
        appId: "1:1053280749548:web:1cb4g687h4ttguk479976592b350c05762c9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'digitalibrary-v1';
    const ADMIN_CODE = "$0Ul4yM4NE&25137";
    const GENRES = ["Tous", "Roman", "Aventure", "Horreur", "Manga", "Histoire", "Policier"];

    let state = {
        user: null, view: 'home', selectedBook: null,
        books: [], myPurchases: [], selectedGenre: "Tous",
        isAdmin: false
    };

    // --- NAVIGATION ---
    window.navigateTo = (view, data = null) => {
        state.view = view;
        state.selectedBook = data;
        render();
    };

    // --- RENDU PRINCIPAL ---
    window.render = () => {
        const container = document.getElementById('view-container');
        const headerActions = document.getElementById('header-actions');
        
        headerActions.innerHTML = `
            ${state.user && !state.user.isAnonymous ? `<button onclick="navigateTo('library')" class="p-2 text-gray-600"><i data-lucide="library"></i></button>` : ''}
            <button onclick="handleAdminAccess()" class="p-2 ${state.isAdmin ? 'text-blue-600' : 'text-gray-400'}"><i data-lucide="lock"></i></button>
            ${state.user && !state.user.isAnonymous ? `<button onclick="logout()" class="p-2 text-red-400"><i data-lucide="log-out"></i></button>` : ''}
        `;

        if (state.view === 'home') renderHome(container);
        else if (state.view === 'detail') renderDetail(container);
        else if (state.view === 'admin') renderAdmin(container);
        else if (state.view === 'library') renderLibrary(container);
        else if (state.view === 'reader') renderReader(container);
        else if (state.view === 'login') renderLogin(container);

        lucide.createIcons();
    };

// --- FONCTIONS DE VUE ---
    window.renderHome = (container) => {
        const filtered = state.books.filter(b => (state.selectedGenre === "Tous" || b.genre === state.selectedGenre));
        container.innerHTML = `
            <div class="space-y-6">
                <div class="flex flex-wrap gap-2 justify-center">
                    ${GENRES.map(g => `<button onclick="setGenre('${g}')" class="px-4 py-1 rounded-full border ${state.selectedGenre === g ? 'bg-blue-600 text-white' : 'bg-white'}">${g}</button>`).join('')}
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    ${filtered.map(book => `
                        <div onclick="navigateTo('detail', ${JSON.stringify(book).replace(/"/g, '&quot;')})" class="bg-white rounded-xl overflow-hidden shadow-sm border cursor-pointer">
                            <img src="${book.coverImage}" class="w-full aspect-[3/4] object-cover">
                            <div class="p-3"><h3 class="font-bold text-sm">${book.title}</h3></div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    };

    window.renderDetail = (container) => {
        const book = state.selectedBook;
        const isOwned = state.myPurchases.includes(book.id);
        container.innerHTML = `
            <div class="bg-white p-6 rounded-2xl shadow-lg space-y-4">
                <img src="${book.coverImage}" class="w-48 mx-auto rounded-lg shadow-md">
                <h1 class="text-2xl font-bold text-center">${book.title}</h1>
                <p class="text-center text-xl font-bold">${book.price} €</p>
                ${isOwned ? 
                    `<button onclick="navigateTo('reader', ${JSON.stringify(book).replace(/"/g, '&quot;')})" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Lire</button>` :
                    `<button onclick="handlePurchase()" class="w-full bg-black text-white py-3 rounded-xl font-bold">Acheter</button>`
                }
                <button onclick="navigateTo('home')" class="w-full text-slate-500">Retour</button>
            </div>`;
    };

    window.renderLibrary = (container) => {
        const owned = state.books.filter(b => state.myPurchases.includes(b.id));
        container.innerHTML = `<h1 class="text-xl font-bold mb-4">Mes livres</h1>
            <div class="grid grid-cols-2 gap-4">
                ${owned.length > 0 ? owned.map(b => `<div onclick="navigateTo('reader', ${JSON.stringify(b).replace(/"/g, '&quot;')})" class="bg-white p-2 rounded border text-center cursor-pointer"><img src="${b.coverImage}" class="rounded mb-2">${b.title}</div>`).join('') : '<p class="col-span-full text-slate-400">Aucun livre acheté.</p>'}
            </div>`;
    };

    window.renderAdmin = (container) => {
        container.innerHTML = `
            <div class="bg-white p-6 rounded-xl border space-y-4">
                <h2 class="font-bold">Ajouter un livre</h2>
                <input id="admin-title" placeholder="Titre" class="w-full p-2 border">
                <input id="admin-price" type="number" placeholder="Prix" class="w-full p-2 border">
                <input id="admin-cover" placeholder="URL Image" class="w-full p-2 border">
                <textarea id="admin-content" placeholder="Texte du livre" class="w-full p-2 border h-32"></textarea>
                <button onclick="saveBook()" class="w-full bg-blue-600 text-white py-2 rounded">Enregistrer</button>
            </div>`;
    };

    window.renderReader = (container) => {
        container.innerHTML = `<div class="bg-white p-6 rounded shadow-sm">
            <button onclick="navigateTo('library')" class="text-blue-600 mb-4 underline">Retour</button>
            <h1 class="text-2xl font-bold mb-4">${state.selectedBook.title}</h1>
            <div class="whitespace-pre-wrap">${state.selectedBook.contentText || 'Pas de texte.'}</div>
        </div>`;
    };

window.renderLogin = (container) => {
        container.innerHTML = `
            <div class="max-w-md mx-auto p-6 bg-white rounded-2xl shadow-lg border border-slate-100 space-y-6">
                <div class="text-center">
                    <h2 class="text-2xl font-bold text-slate-800">Espace Membre</h2>
                    <p class="text-slate-500 text-sm mt-1">Connectez-vous pour accéder à vos lectures</p>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input id="log-email" type="email" placeholder="exemple@outlook.com" 
                            class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
                        <input id="log-pass" type="password" placeholder="••••••••" 
                            class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button onclick="handleAuthAction('login')" 
                        class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md shadow-blue-200 transition active:scale-95">
                        Se connecter
                    </button>
                    
                    <div class="relative py-2">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
                        <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-400">Nouveau ici ?</span></div>
                    </div>

                    <button onclick="handleAuthAction('signup')" 
                        class="w-full bg-slate-50 text-blue-600 py-3 rounded-xl font-bold border border-blue-100 hover:bg-blue-50 transition active:scale-95">
                        Créer un compte gratuitement
                    </button>
                </div>

                <button onclick="navigateTo('home')" class="w-full text-center text-slate-400 text-sm hover:text-slate-600">
                    Retourner à la boutique
                </button>
            </div>`;
    };

    // --- ACTIONS ---
    window.setGenre = (g) => { state.selectedGenre = g; render(); };
    window.handleAdminAccess = () => { if(prompt("Code ?") === ADMIN_CODE) { state.isAdmin = true; navigateTo('admin'); } };
    
    window.saveBook = async () => {
        const book = {
            title: document.getElementById('admin-title').value,
            price: parseFloat(document.getElementById('admin-price').value),
            coverImage: document.getElementById('admin-cover').value,
            contentText: document.getElementById('admin-content').value,
            genre: "Roman", isPublished: true
        };
        await addDoc(collection(db, 'books'), book);
        alert("Livre ajouté !");
        navigateTo('home');
    };

    window.handlePurchase = async () => {
        if (!state.user || state.user.isAnonymous) return navigateTo('login');
        await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'purchases', state.selectedBook.id), {
            bookId: state.selectedBook.id, date: serverTimestamp()
        });
        navigateTo('library');
    };

    window.handleAuthAction = async (type) => {
        const email = document.getElementById('log-email').value;
        const pass = document.getElementById('log-pass').value;
        if (!email || !pass) return alert("Remplissez les champs");
        
        try {
            if (type === 'signup') {
                const { createUserWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
                await createUserWithEmailAndPassword(auth, email, pass);
                alert("Compte créé !");
            } else {
                await signInWithEmailAndPassword(auth, email, pass);
            }
            navigateTo('home');
        } catch (e) { alert("Erreur: " + e.message); }
    };

    window.logout = () => { signOut(auth); state.isAdmin = false; navigateTo('home'); };

    // --- INITIALISATION ---
    onAuthStateChanged(auth, (user) => {
        state.user = user;
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('main-content').classList.remove('hidden');
        
        if (user) {
            onSnapshot(collection(db, 'books'), (snap) => {
                state.books = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'purchases'), (snap) => {
                state.myPurchases = snap.docs.map(d => d.id);
                render();
            });
        } else {
            signInAnonymously(auth).catch(err => console.error("Erreur Auth Anonyme:", err));
        }
        render();
    });
    </script>
</body>
</html>
